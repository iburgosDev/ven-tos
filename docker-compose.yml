services:
  postgres:
    image: postgres:15
    container_name: ventos_postgres
    environment:
      POSTGRES_USER: ventos
      POSTGRES_PASSWORD: ventos123
      POSTGRES_DB: ventos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ventos_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: